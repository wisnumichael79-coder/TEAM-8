<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 font-sans">
    
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-1 h-fit">
        <div class="flex items-center space-x-3 mb-6">
            <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center font-bold">☕</div>
            <div>
                <h3 class="text-lg font-bold text-slate-800">Kontrol Istirahat</h3>
                <p class="text-xs text-slate-400">Pencatatan aktivitas keluar-masuk</p>
            </div>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-slate-700 mb-1">Pilih Anggota Staff</label>
            <select id="staff-name" class="w-full p-3 border border-slate-300 rounded-lg text-slate-900 bg-white outline-none focus:ring-2 focus:ring-blue-500">
                </select>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-slate-700 mb-1">Alasan Keluar (OUT)</label>
            <select id="break-reason" onchange="toggleCustomReasonInput()" class="w-full p-3 border border-slate-300 rounded-lg text-slate-900 bg-white outline-none focus:ring-2 focus:ring-blue-500">
                <option value="Rokok">🚬 Rokok</option>
                <option value="Toilet">🚽 Toilet</option>
                <option value="Lainnya">📝 Lainnya (Tulis Manual)</option>
            </select>
        </div>

        <div id="custom-reason-container" class="mb-6 hidden">
            <label class="block text-sm font-medium text-slate-700 mb-1">Tulis Alasan Lainnya</label>
            <input type="text" id="custom-reason" placeholder="Contoh: Makan siang, fotokopi, dll..." class="w-full p-3 border border-slate-300 rounded-lg text-slate-900 bg-white outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button onclick="startBreak()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold p-3.5 rounded-lg transition shadow-md cursor-pointer block text-center tracking-wide">
            MULAI ISTIRAHAT (OUT)
        </button>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h3 class="text-lg font-bold text-slate-800">Aktivitas Istirahat Hari Ini</h3>
                <p class="text-xs text-slate-400">Daftar staff yang sedang atau telah selesai istirahat</p>
            </div>
            <div id="btn-delete-log-container">
                <button onclick="deleteSelectedLogs()" class="text-xs bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold px-3 py-2 rounded-lg border border-rose-200 transition cursor-pointer">
                    🗑️ Hapus Terpilih
                </button>
            </div>
        </div>

        <div class="overflow-x-auto rounded-xl border border-slate-100">
            <table class="w-full text-left text-sm border-collapse">
                <thead>
                    <tr class="bg-slate-900 text-slate-200 text-xs uppercase tracking-wider font-semibold">
                        <th id="th-check-log" class="p-4 text-center w-12">
                            <input type="checkbox" onclick="toggleSelectAllLogs(this)" class="w-4 h-4 rounded border-gray-300 focus:ring-blue-500">
                        </th>
                        <th class="p-4">Tanggal</th>
                        <th class="p-4">Nama</th>
                        <th class="p-4">Shift</th>
                        <th class="p-4">Alasan</th>
                        <th class="p-4 text-amber-500">OUT</th>
                        <th class="p-4 text-emerald-500">IN</th>
                        <th class="p-4">Durasi</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="log-table-body" class="divide-y divide-slate-100 text-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

</div>
