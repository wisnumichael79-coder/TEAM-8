<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM 8 - Sistem Manajemen Staff</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 px-4">
        <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i data-lucide="lock" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">TEAM 8</h2>
                <p class="text-sm text-slate-400 mt-1">Silakan Masuk</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">User ID</label>
                    <input type="text" id="login-uid" placeholder="Masukkan User ID" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold p-3 rounded-lg transition shadow-md flex justify-center items-center gap-2 mt-2">
                    <span>Masuk Aplikasi</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col justify-between p-4 shadow-lg shrink-0">
            <div class="space-y-6">
                <div class="flex items-center space-x-3 px-2 py-3 border-b border-slate-800">
                    <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">T8</div>
                    <div>
                        <h1 class="font-bold text-white text-sm tracking-wide">TEAM 8 INTERNAL</h1>
                        <p class="text-xs text-emerald-400 font-medium flex items-center gap-1">Online</p>
                    </div>
                </div>
                
                <nav class="space-y-1">
                    <button id="btn-dashboard" onclick="loadPage('dashboard')" class="flex items-center space-x-3 w-full p-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition">
                        <i data-lucide="layout-dashboard"></i>
                        <span>Dashboard</span>
                    </button>
                    <button id="btn-inout" onclick="loadPage('inout')" class="flex items-center space-x-3 w-full p-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition">
                        <i data-lucide="coffee"></i>
                        <span>IN/OUT</span>
                    </button>
                    <button id="btn-manajemen" onclick="loadPage('manajemen')" class="flex items-center space-x-3 w-full p-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition">
                        <i data-lucide="users"></i>
                        <span>Manajemen Staff</span>
                    </button>
                    <button id="btn-absensi" onclick="loadPage('absensi')" class="flex items-center space-x-3 w-full p-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition">
                        <i data-lucide="calendar-check"></i>
                        <span>Jadwal & Absensi</span>
                    </button>
                </nav>
            </div>
            
            <div class="pt-4 border-t border-slate-800">
                <button onclick="handleLogout()" class="flex items-center space-x-3 w-full p-3 rounded-lg text-rose-400 hover:bg-rose-950/40 hover:text-rose-300 transition font-medium">
                    <i data-lucide="log-out"></i>
                    <span>Keluar Sistem</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0 shadow-sm">
                <h2 id="page-title" class="text-xl font-bold text-gray-800">Dashboard</h2>
                <div class="flex items-center space-x-2 text-sm text-gray-500 font-medium bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100">
                    <i data-lucide="user-check" class="w-4 h-4 text-blue-500"></i>
                    <span>Administrator</span>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6 bg-slate-50">
                <div id="main-content">
                    </div>
            </main>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="script.js"></script>
</body>
</html>
