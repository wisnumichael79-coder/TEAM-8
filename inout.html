<div class="space-y-6">
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">Pencatatan Istirahat (Break) Staff</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Pilih Nama Staff</label>
                <select id="staff-name" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
                    <option value="" disabled selected>-- Pilih Anggota Staff --</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Waktu Sekarang</label>
                <div id="live-clock" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-600 font-mono font-bold">
                    00:00:00
                </div>
            </div>
        </div>

        <div>
            <button onclick="startBreak()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium p-3 rounded-lg flex justify-center items-center space-x-2 transition shadow-sm">
                <i data-lucide="coffee"></i>
                <span>MULAI ISTIRAHAT (BREAK OUT)</span>
            </button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
            <h3 class="font-semibold text-gray-800">Riwayat Istirahat Terdata</h3>
            <button onclick="deleteSelectedLogs()" class="bg-rose-50 hover:bg-rose-100 text-rose-600 text-sm font-semibold px-4 py-2 rounded-lg flex items-center space-x-1 transition">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                <span>Hapus Data Terpilih</span>
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 text-slate-600 text-sm uppercase font-semibold">
                        <th class="p-4 border-b w-12 text-center">
                            <input type="checkbox" id="check-all-logs" onclick="toggleSelectAllLogs(this)" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        </th>
                        <th class="p-4 border-b">Tanggal</th>
                        <th class="p-4 border-b">Nama Staff</th>
                        <th class="p-4 border-b">Shift</th>
                        <th class="p-4 border-b">Waktu Keluar</th>
                        <th class="p-4 border-b">Waktu Masuk</th>
                        <th class="p-4 border-b">Durasi Break</th>
                        <th class="p-4 border-b text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="log-table-body" class="text-gray-700 text-sm divide-y divide-gray-100">
                    <tr id="empty-row">
                        <td colspan="8" class="p-8 text-center text-gray-400">Belum ada aktivitas istirahat tercatat.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
